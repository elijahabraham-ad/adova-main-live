<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adova Digital</title>
    <!-- SPA redirect: rewrite path into sessionStorage so React Router can pick it up -->
    <script>
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/')[0] + '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash);
    </script>
  </head>
  <body></body>
</html>
